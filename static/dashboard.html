<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: white;

    /* 🔥 FIX FOR FOOTER */
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* DARK MODE */
.dark {
    background: linear-gradient(135deg, #1e293b, #0f172a);
}

/* MAIN WRAPPER */
.main {
    flex: 1;   /* 🔥 pushes footer down */
}

/* HEADER */
.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 40px;
}

/* TITLE */
.title {
    font-size: 22px;
    font-weight: bold;
}

/* USER */
.user-section {
    display: flex;
    align-items: center;
    gap: 10px;
}

/* BUTTONS */
.header button {
    padding: 8px 12px;
    border-radius: 10px;
    border: none;
    background: #83b2fd;
    color: white;
    cursor: pointer;
}

/* CARDS */
.container {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-top: 80px;
    flex-wrap: wrap;
}

.card {
    width: 220px;
    height: 160px;
    background: #334155;
    border-radius: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    transition: 0.2s;
}

.card:hover {
    transform: translateY(-5px);
}

/* STATS */
.stats {
    display: flex;
    justify-content: center;
    gap: 20px;
    margin-top: 30px;
    flex-wrap: wrap;
}

.stat-card {
    padding: 12px 20px;
    background: #334155;
    border-radius: 12px;
}

/* FOOTER */
.footer {
    text-align: center;
    padding: 12px;
    font-size: 15px;
    opacity: 0.8;
}

/* MOBILE */
@media (max-width: 768px) {

    .header {
        flex-direction: column;
        gap: 10px;
        text-align: center;
    }

    .container {
        flex-direction: column;
        align-items: center;
    }

    .card {
        width: 90%;
        max-width: 300px;
    }

    .stats {
        flex-direction: column;
        align-items: center;
    }

    .stat-card {
        width: 80%;
        text-align: center;
    }
}
</style>
</head>

<body>

<!-- 🔥 WRAPPER START -->
<div class="main">

    <div class="header">
        <div class="title">🚀 FocusFlow</div>

        <div class="user-section">
            <span id="usernameDisplay"></span>
            <button onclick="toggleDark()">🌙</button>
            <button onclick="logout()">Logout</button>
        </div>
    </div>

    <div class="container">
        <div class="card" onclick="goNotes()">📝 Notes</div>
        <div class="card" onclick="goTodo()">✅ To-Do</div>
        <div class="card" onclick="goPomodoro()">⏳ Pomodoro</div>
    </div>

    <div class="stats">
        <div class="stat-card">📝 <span id="notesCount"></span></div>
        <div class="stat-card">✅ <span id="todoCount"></span></div>
        <div class="stat-card">🔥 <span id="doneCount"></span></div>
    </div>

</div>
<!-- 🔥 WRAPPER END -->

<!-- FOOTER -->
<div class="footer">
    💡 Stay consistent. Small steps every day.
</div>

<script>

// NAVIGATION
function goNotes() { window.location.href = "notes.html"; }
function goTodo() { window.location.href = "todo.html"; }
function goPomodoro() { window.location.href = "pomodoro.html"; }

// LOGOUT
function logout() {
    localStorage.removeItem("token");
    window.location.href = "index.html";
}

// THEME APPLY
function applyTheme() {
    const theme = localStorage.getItem("theme");

    if (theme === "dark") {
        document.body.classList.add("dark");
    }
}

// TOGGLE
function toggleDark() {
    const isDark = document.body.classList.toggle("dark");
    localStorage.setItem("theme", isDark ? "dark" : "light");
}

// USER
function loadUser() {
    const token = localStorage.getItem("token");
    if (!token) return;

    const payload = JSON.parse(atob(token.split(".")[1]));
    document.getElementById("usernameDisplay").innerText =
        "👋 " + payload.username;
}

// STATS
async function loadStats() {
    const token = localStorage.getItem("token");

    const res = await fetch("/stats", {
        headers: { "Authorization": "Bearer " + token }
    });

    const data = await res.json();

    document.getElementById("notesCount").innerText = data.notes;
    document.getElementById("todoCount").innerText = data.todos;
    document.getElementById("doneCount").innerText = data.completed;
}

// INIT
applyTheme();
loadUser();
loadStats();

</script>

</body>
</html>
